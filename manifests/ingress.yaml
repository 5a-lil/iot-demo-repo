apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp-ingress
  namespace: dev
spec:
  rules:
  - host: wil.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wil-svc
            port:
              number: 80

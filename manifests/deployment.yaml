apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: wil-container
        image: wil42/playground:v1 # ← CHANGE VERSION HERE
        ports:
        - containerPort: 80
